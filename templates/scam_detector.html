{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="glass-card p-5 mt-4">
            <h2 class="text-white mb-3"><i class="fas fa-user-secret text-danger"></i> Scam Detector</h2>
            <p class="text-muted">Paste a suspicious email, SMS, or message below. Our AI heuristics will scan for phishing and fraud indicators.</p>
            
            <textarea id="scam-input" class="form-control glass-input mb-3" rows="6" placeholder="Paste the suspicious message here... For example: 'URGENT! Your UPI is blocked. Click here to update: http://fake-link.com'"></textarea>
            
            <button id="analyze-btn" class="btn btn-danger w-100 mb-4">Analyze Message</button>
            
            <div id="result-box" class="glass-panel p-4 d-none">
                <h4 class="text-white">Risk Level: <span id="risk-level"></span></h4>
                <p class="text-white">Threat Score: <span id="risk-score" class="fw-bold"></span>/100</p>
                <div id="threat-list" class="text-warning mb-3"></div>
                <div class="alert alert-info glass-panel text-white mb-0" id="recommendation"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('analyze-btn').addEventListener('click', async () => {
    const msg = document.getElementById('scam-input').value;
    if(!msg) return alert('Please enter a message.');
    
    // Send data to our Flask backend
    const res = await fetch('/analyze-message', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: msg})
    });
    
    const data = await res.json();
    document.getElementById('result-box').classList.remove('d-none');
    
    const levelEl = document.getElementById('risk-level');
    levelEl.innerText = data.level;
    levelEl.className = data.level === 'High' ? 'text-danger fw-bold' : (data.level === 'Medium' ? 'text-warning fw-bold' : 'text-success fw-bold');
    
    document.getElementById('risk-score').innerText = data.score;
    
    const threatList = data.threats.map(t => `<li><i class="fas fa-exclamation-triangle"></i> ${t}</li>`).join('');
    document.getElementById('threat-list').innerHTML = `<ul>${threatList}</ul>`;
    
    document.getElementById('recommendation').innerText = data.recommendation;
});
</script>
{% endblock %}
